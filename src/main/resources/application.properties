spring.application.name=geeksync-erp

# ConexŃo com o Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/geeksync_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Dr@ken102436}

# Configurań§es do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Desabilitar temporariamente o Spring Security para nŃo bloquear nossos testes iniciais
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration