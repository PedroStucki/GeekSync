<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div id="section-clientes" class="sub-page" style="display:block;">

        <!-- Header -->
        <div class="page-header">
            <div>
                <h1>👤 Clientes</h1>
                <p>Gerencie o cadastro de clientes da loja</p>
            </div>
            <button class="btn btn-primary" onclick="abrirModalCliente()">
                <i class="bi bi-plus-circle"></i>
                Novo Cliente
            </button>
        </div>

        <!-- Barra de Pesquisa -->
        <div class="search-bar">
            <input type="text" id="pesquisaCliente" placeholder="Buscar por nome ou CPF..." onkeyup="pesquisarCliente()" />
        </div>

        <!-- Tabela de Clientes -->
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaClientes">
                        <tr>
                            <td colspan="7" class="empty">
                                <p>Carregando clientes...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ============================================================
         MODAL - CLIENTE
    ============================================================ -->

    <div class="modal-overlay" id="modalCliente">
        <div class="modal">
            <h3 id="modalClienteTitle">👤 Novo Cliente</h3>
            <p style="color:var(--muted); font-size:.9rem;">Preencha os dados do cliente</p>

            <input type="hidden" id="clienteId">

            <div class="form-group">
                <label>Nome *</label>
                <input type="text" id="nome" placeholder="Ex: João Silva" />
                <span class="error-msg" id="err-nome">Campo obrigatório</span>
            </div>

            <div class="form-group">
                <label>CPF *</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)" />
                <span class="error-msg" id="err-cpf">CPF inválido</span>
            </div>

            <div class="form-group">
                <label>E-mail *</label>
                <input type="email" id="email" placeholder="joao@email.com" />
                <span class="error-msg" id="err-email">E-mail inválido</span>
            </div>

            <div class="form-group">
                <label>Telefone</label>
                <input type="text" id="telefone" placeholder="(61) 99999-9999" maxlength="15" oninput="maskTel(this)" />
            </div>

            <div class="form-group">
                <label>Endereço</label>
                <input type="text" id="endereco" placeholder="Rua, número, bairro, cidade" />
            </div>

            <div class="form-actions">
                <button class="btn btn-secondary" onclick="fecharModalCliente()">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarCliente()">
                    <i class="bi bi-check-lg"></i>
                    Salvar Cliente
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================================
         SCRIPTS (somente links, SEM script inline)
    ============================================================ -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/clientes.js"></script>

</body>

</html>
